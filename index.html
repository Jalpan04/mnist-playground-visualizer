<!doctype html>

<html>
<head>
  <title>MNIST Neural Visualizer</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="bundle.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script src="lib.js"></script>
</head>
<body>
  <!-- Header -->
  <header>
    <h1 class="l--page"><b>MNIST</b> Neural Network Visualizer</h1>
    <p class="l--page" style="margin-top: -10px; opacity: 0.7;">Draw a digit to see the neural signal propagate in real-time.</p>
  </header>

  <!-- Top Controls -->
  <div id="top-controls">
    <div class="container l--page">
      <div class="timeline-controls">
        <button class="mdl-button mdl-js-button mdl-button--icon ui-resetButton" id="reset-button" title="Reset the network">
          <i class="material-icons">replay</i>
        </button>
        <button class="mdl-button mdl-js-button mdl-button--fab mdl-button--colored ui-playButton" id="play-pause-button" title="Run/Pause">
          <i class="material-icons">play_arrow</i>
          <i class="material-icons">pause</i>
        </button>
      </div>
      <div class="control">
        <span class="label">Training Step</span>
        <span class="value" id="iter-number">000,000</span>
      </div>
    </div>
  </div>

  <!-- Main Part -->
  <div id="main-part" class="l--page">

    <!--  Data Column-->
    <div class="column data">
      <h4>
        <span>Input</span>
      </h4>
      <div class="ui-dataset">
        <div id="drawing-container" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 20px; backdrop-filter: blur(10px);">
          <canvas id="user-draw-canvas" width="140" height="140" style="background: black; cursor: crosshair; display: block; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);"></canvas>
          <div style="display:flex; justify-content: center; margin-top: 15px; gap: 10px;">
            <button class="mdl-button mdl-js-button mdl-button--raised" id="clear-drawing" style="background: rgba(255,255,255,0.1); color: white;">Clear</button>
          </div>
        </div>
        <div class="mnist-training-view" style="text-align:center;">
          <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px;">Live Training Stream</p>
          <canvas id="train-preview-canvas" width="28" height="28" style="background: #000; width: 64px; height: 64px; image-rendering: pixelated; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);"></canvas>
        </div>
      </div>
    </div>

    <!-- Network Column -->
    <div class="column features" style="flex: 2;">
      <h4>Neural Network</h4>
      <p style="font-size: 12px; opacity: 0.6; margin-top: -5px;">Real-time signal flow & weights visualization</p>
      <div id="network-canvas-container" style="position:relative; width: 100%; height: 600px; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden;">
        <!-- Canvas will be injected here -->
      </div>
    </div>

    <!-- Prediction Column -->
    <div class="column output">
      <h4>Prediction</h4>
      <div class="metrics">
        <div class="output-stats train">
          <span>Accuracy</span>
          <div class="value" id="accuracy-display">0%</div>
        </div>
        <div class="output-stats train">
          <span>Current Loss</span>
          <div class="value" id="loss-train">0.0</div>
        </div>
      </div>
      <div id="prediction-bars" style="margin-top: 20px; min-height: 300px; display: flex; flex-direction: column; gap: 8px;">
        <!-- Distribution will be injected here -->
      </div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
